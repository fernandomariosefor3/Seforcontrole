<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEDUC-CE · Painel da Superintendência Escolar 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="logo-text">
        <span class="logo-title">SEDUC-CE</span>
        <span class="logo-sub">Superintendência 2026</span>
      </div>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-group">
      <span class="nav-group-label">VISÃO GERAL</span>
      <a href="#" class="nav-item active" data-page="dashboard">
        <i class="fas fa-chart-line"></i><span>Dashboard</span>
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">GESTÃO DE ESCOLAS</span>
      <a href="#" class="nav-item" data-page="escolas">
        <i class="fas fa-school"></i><span>Escolas</span>
      </a>
      <a href="#" class="nav-item" data-page="indicadores">
        <i class="fas fa-chart-bar"></i><span>Indicadores</span>
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">ACOMPANHAMENTO</span>
      <a href="#" class="nav-item" data-page="frequencia">
        <i class="fas fa-user-check"></i><span>Frequência & Fluxo</span>
      </a>
      <a href="#" class="nav-item" data-page="notas">
        <i class="fas fa-edit"></i><span>Notas</span>
      </a>
      <a href="#" class="nav-item" data-page="plano-acao">
        <i class="fas fa-bullseye"></i><span>Plano de Ação</span>
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">SUPERINTENDÊNCIA</span>
      <a href="#" class="nav-item" data-page="visitas">
        <i class="fas fa-map-marker-alt"></i><span>Visitas</span>
      </a>
      <a href="#" class="nav-item" data-page="projetos">
        <i class="fas fa-rocket"></i><span>Projetos Extraclasse</span>
      </a>
    </div>
    <div class="nav-group">
      <span class="nav-group-label">PROGRAMAS</span>
      <a href="#" class="nav-item" data-page="busca-ativa">
        <i class="fas fa-search"></i><span>Busca Ativa</span>
      </a>
      <a href="#" class="nav-item" data-page="agenda">
        <i class="fas fa-calendar-alt"></i><span>Agenda & Alertas</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <span>Ano Letivo 2026 · SEDUC-CE</span>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content" id="mainContent">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="breadcrumb" id="breadcrumb">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-info">
        <i class="fas fa-calendar"></i>
        <span id="currentDate"></span>
      </div>
      <div class="topbar-badge">
        <i class="fas fa-bell"></i>
        <span class="badge-count" id="alertCount">0</span>
      </div>
      <div class="topbar-user">
        <i class="fas fa-user-circle"></i>
        <span>Superintendente</span>
      </div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div class="page-content" id="pageContent">
    <!-- Conteúdo injetado via JS -->
  </div>

</main>

<!-- MODAL GLOBAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h3 id="modalTitle">Título</h3>
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/escolas.js"></script>
<script src="js/pages/indicadores.js"></script>
<script src="js/pages/frequencia.js"></script>
<script src="js/pages/notas.js"></script>
<script src="js/pages/plano-acao.js"></script>
<script src="js/pages/visitas.js"></script>
<script src="js/pages/projetos.js"></script>
<script src="js/pages/busca-ativa.js"></script>
<script src="js/pages/agenda.js"></script>
<script src="js/app.js"></script>
</body>
</html>
